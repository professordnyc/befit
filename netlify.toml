# Netlify configuration for Befit frontend

[build]
  publish = "frontend"
  command = "echo 'Frontend is static HTML/CSS/JS - no build step required'"

[context.production]
  environment = { BEFIT_ENV = "production" }

[context.deploy-preview]
  environment = { BEFIT_ENV = "staging" }

[context.branch-deploy]
  environment = { BEFIT_ENV = "preview" }

# Redirect all requests to index.html for client-side routing (if needed)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    # Update Access-Control-Allow-Origin to match your Render backend
    # Access-Control-Allow-Origin = "https://befit-backend-z9q1.onrender.com"

# Cache static assets (CSS, JS, images)
[[headers]]
  for = "/{{*.js,*.css,*.jpg,*.jpeg,*.png,*.gif,*.svg}}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
