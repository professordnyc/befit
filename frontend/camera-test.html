<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Camera Test</title>
  <style>
    body { font-family: sans-serif; padding: 1rem; background: #f5f5f5; }
    video { width: 100%; max-width: 480px; background: #000; display: block; border-radius: 8px; }
    pre  { background: #111; color: #0f0; padding: .75rem; border-radius: 6px;
           font-size: .8rem; white-space: pre-wrap; margin-top: .75rem; }
    button { margin-top: .5rem; margin-right: .5rem; padding: .5rem 1rem; font-size: .9rem; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Befit – Camera &amp; Mic diagnostics</h2>
  <video id="v" autoplay playsinline muted></video>
  <div>
    <button onclick="testCamera()">&#128247; Test camera</button>
    <button onclick="testMic()">&#127908; Test mic</button>
  </div>
  <pre id="log">Click a button to run a test…</pre>

<script>
const log = document.getElementById('log');
const v   = document.getElementById('v');
let camStream = null;

function out(msg) { log.textContent += msg + '\n'; }

async function testCamera() {
  log.textContent = '';
  out('protocol: ' + location.protocol);
  out('mediaDevices: ' + !!navigator.mediaDevices?.getUserMedia);

  if (!navigator.mediaDevices?.getUserMedia) {
    out('ERROR: getUserMedia unavailable (requires HTTPS or localhost)'); return;
  }

  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    out('video inputs (pre-permission): ' + cams.length);
    cams.forEach((c,i) => out('  ['+i+'] '+(c.label||'(hidden until permission)')));
  } catch(e) { out('enumerateDevices error: ' + e.message); }

  out('\nRequesting camera…');
  try {
    if (camStream) camStream.getTracks().forEach(t => t.stop());
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    });
    v.srcObject = camStream;
    out('SUCCESS – tracks: ' + camStream.getVideoTracks().length);
    camStream.getVideoTracks().forEach(t => out('  ' + t.label + ' [' + t.readyState + ']'));
  } catch(e) { out('ERROR: ' + e.name + ' – ' + e.message); }
}

async function testMic() {
  log.textContent = '';
  out('Testing microphone…');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  out('SpeechRecognition API: ' + (SR ? 'available' : 'NOT available'));

  try {
    const s = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    out('Mic permission: granted');
    out('Track: ' + s.getAudioTracks()[0]?.label);
    s.getTracks().forEach(t => t.stop());
  } catch(e) { out('Mic ERROR: ' + e.name + ' – ' + e.message); }

  if (SR) {
    out('\nStarting SpeechRecognition test (speak something)…');
    const r = new SR();
    r.lang = 'en-US'; r.interimResults = false;
    r.onstart  = () => out('Listening…');
    r.onresult = (e) => { out('Heard: ' + e.results[0][0].transcript); r.stop(); };
    r.onerror  = (e) => out('SR error: ' + e.error);
    r.onend    = () => out('SR ended.');
    r.start();
  }
}
</script>
</body>
</html>
