name: Deploy to Render & Netlify

on:
  push:
    branches: [main]

jobs:
  # ── 1. Run tests first ────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Lint with ruff
        run: uv run ruff check backend/ tests/

      - name: Format check with black
        run: uv run black --check backend/ tests/

      - name: Run tests
        run: uv run pytest tests/ -v --cov=backend --cov-report=term-missing

  # ── 2. Deploy only after all test matrix jobs pass ────────────────────────
  deploy-render:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping Render deploy."
            exit 0
          fi
          curl --silent --show-error --fail --request POST "${RENDER_DEPLOY_HOOK_URL}"

  deploy-netlify:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Netlify deployment
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "${NETLIFY_BUILD_HOOK_URL}" ]; then
            echo "NETLIFY_BUILD_HOOK_URL not set — skipping Netlify deploy."
            exit 0
          fi
          curl --silent --show-error --fail --request POST "${NETLIFY_BUILD_HOOK_URL}"
